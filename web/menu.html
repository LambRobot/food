<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Menu Helper — least-worst option</title>
<style>
  :root{
    --bg:#f6f5f1; --card:#fff; --ink:#2c2a28; --muted:#7a756e; --line:#e7e3dc;
    --a:#1f9d55; --b:#7cb342; --c:#e0a800; --d:#e8730c; --f:#d0342c; --accent:#3b6ea5;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--ink);font-size:15px}
  header{background:linear-gradient(135deg,#3b6ea5,#2c5580);color:#fff;padding:16px 20px}
  header h1{margin:0 0 3px;font-size:20px;font-weight:600}
  header a{color:#cfe3f5;text-decoration:none;font-size:13px}
  header .sub{opacity:.9;font-size:12.5px;margin-top:2px}
  .disclaimer{background:#fff7e6;border-bottom:1px solid #f0e2bd;color:#7a5b00;font-size:12px;padding:6px 20px}
  main{max-width:680px;margin:0 auto;padding:18px 16px 60px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:16px;
         box-shadow:0 1px 3px rgba(0,0,0,.05)}
  label.file{display:block;border:2px dashed #bcdcc2;background:#eef6ef;border-radius:12px;padding:22px;
        text-align:center;cursor:pointer;color:#2c6e3f;font-weight:600}
  label.file input{display:none}
  #preview{display:none;max-width:100%;max-height:280px;border-radius:10px;margin-top:12px}
  .note{width:100%;font:inherit;padding:9px 11px;border:1px solid var(--line);border-radius:9px;margin-top:12px}
  button{font:inherit;font-weight:600;background:var(--accent);color:#fff;border:none;border-radius:10px;
         padding:11px 18px;cursor:pointer;margin-top:12px;width:100%}
  button:disabled{background:#b9c4cf;cursor:default}
  .pill{display:inline-block;min-width:22px;text-align:center;padding:2px 9px;border-radius:20px;
        color:#fff;font-weight:700;font-size:13px}
  .g-A{background:var(--a)} .g-B{background:var(--b)} .g-C{background:var(--c)}
  .g-D{background:var(--d)} .g-F{background:var(--f)}
  .pick{border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin:10px 0}
  .pick h3{margin:0 0 5px;font-size:16px;display:flex;gap:8px;align-items:center}
  .pick .why{font-size:13.5px;margin:3px 0}
  .pick .tweaks{font-size:13px;color:#1f7a3d;margin-top:5px}
  .avoid{font-size:13.5px;color:#b23}
  .avoid b{color:var(--ink)}
  .headsup{background:#fff7e6;border:1px solid #f0e2bd;border-radius:10px;padding:10px 12px;margin:12px 0;font-size:13.5px;color:#7a5b00}
  .headsup b{color:#5a4400}
  .headsup ul{margin:4px 0 0;padding-left:18px}
  .note-out{font-size:13px;color:var(--muted);margin-top:12px;font-style:italic}
  .muted{color:var(--muted);font-size:13px}
  .err{color:#b23;font-size:14px}
  .spin{display:inline-block;width:16px;height:16px;border:2px solid #fff;border-top-color:transparent;
        border-radius:50%;animation:s .8s linear infinite;vertical-align:-3px;margin-right:6px}
  @keyframes s{to{transform:rotate(360deg)}}
  h2{font-size:15px;margin:16px 0 4px}
</style>
</head>
<body>
<header>
  <a href="index.html">← Cookbook</a>
  <h1>📷 Menu Helper</h1>
  <div class="sub">Stuck eating out? Snap the menu — I'll rank the least-worst options for a fatty-liver diet.</div>
</header>
<div class="disclaimer">⚕︎ Educational, evidence-based suggestions — not medical advice. Chains have published nutrition (accurate); independent menus are estimates from the wording (directional).</div>

<main>
  <div class="panel">
    <label class="file">📷 Take a photo or choose a menu image
      <input type="file" id="file" accept="image/*" capture="environment">
    </label>
    <img id="preview" alt="menu preview">
    <input class="note" id="note" placeholder="Anything else? e.g. 'I'm vegetarian' or 'want something light'">
    <button id="go" disabled>Find the least-worst options</button>
  </div>
  <div id="out"></div>
</main>

<script>
// ── After deploying the Cloudflare Worker (see serverless/menu-helper/README.md),
//    paste its URL here, e.g. "https://menu-helper.yourname.workers.dev" ──
const WORKER_URL = "https://menu-helper.lambrobot.workers.dev";

const $ = id => document.getElementById(id);
let imageB64 = null;

$('file').addEventListener('change', async e => {
  const f = e.target.files[0];
  if (!f) return;
  imageB64 = await downscale(f);           // resize + re-encode as JPEG
  $('preview').src = 'data:image/jpeg;base64,' + imageB64;
  $('preview').style.display = 'block';
  $('go').disabled = false;
});

// shrink to max 1600px long edge and JPEG-encode — keeps uploads small & fast
function downscale(file){
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const max = 1600, scale = Math.min(1, max / Math.max(img.width, img.height));
      const c = document.createElement('canvas');
      c.width = Math.round(img.width * scale); c.height = Math.round(img.height * scale);
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      resolve(c.toDataURL('image/jpeg', 0.85).split(',')[1]);
    };
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}

$('go').addEventListener('click', analyze);

async function analyze(){
  if (!imageB64) return;
  if (!WORKER_URL){
    render({error:"Menu Helper isn't connected yet. Deploy the Worker and set WORKER_URL in web/menu.html (see serverless/menu-helper/README.md)."});
    return;
  }
  $('go').disabled = true;
  $('out').innerHTML = '<div class="panel"><span class="spin"></span>Reading the menu…</div>';
  try{
    const r = await fetch(WORKER_URL, {
      method:'POST', headers:{'content-type':'application/json'},
      body: JSON.stringify({image: imageB64, media_type:'image/jpeg', note: $('note').value.trim()})
    });
    render(await r.json());
  }catch(e){
    render({error:"Couldn't reach the Menu Helper service. Check your connection and the Worker URL."});
  }
  $('go').disabled = false;
}

function esc(s){return (s==null?'':''+s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

function render(d){
  if (d.error){ $('out').innerHTML = `<div class="panel err">${esc(d.error)}</div>`; return; }
  const picks = (d.picks||[]).map((p,i)=>`
    <div class="pick">
      <h3>${i+1}. ${esc(p.name)} <span class="pill g-${p.grade||'F'}">${esc(p.grade||'?')}</span></h3>
      <div class="why">${esc(p.why)}</div>
      <div class="tweaks">✎ ${esc(p.tweaks)}</div>
    </div>`).join('');
  const avoid = (d.avoid||[]).length
    ? `<h2>Skip these</h2><div class="avoid"><b>Avoid:</b> ${(d.avoid||[]).map(esc).join(' · ')}</div>` : '';
  const headsup = (d.heads_up||[]).length
    ? `<div class="headsup"><b>👤 Heads-up for you</b><ul>${(d.heads_up||[]).map(h=>`<li>${esc(h)}</li>`).join('')}</ul></div>` : '';
  $('out').innerHTML = `
    <div class="panel">
      ${d.place?`<div class="muted">${esc(d.place)}</div>`:''}
      ${headsup}
      <h2>Least-worst picks</h2>
      ${picks || '<div class="muted">No clear picks found — try a clearer photo.</div>'}
      ${avoid}
      ${d.note?`<div class="note-out">${esc(d.note)}</div>`:''}
    </div>`;
}

// ── demo mode: open menu.html?mock=1 to preview the layout without a Worker ──
if (new URLSearchParams(location.search).get('mock')){
  render({
    place:"Corner Diner (photo)",
    picks:[
      {name:"Grilled chicken Greek salad",grade:"B",why:"Grilled protein + vegetables + olive-oil dressing; no fried or sugary components.",tweaks:"Dressing on the side; water or unsweetened iced tea instead of soda."},
      {name:"Grilled salmon with steamed veg",grade:"B",why:"Omega-3 fish, baked not fried, veg side — strong liver choice; watch the butter.",tweaks:"Ask for it dry-grilled; swap mashed potato for extra veg."},
      {name:"Turkey burger (single, no bun sauce)",grade:"C",why:"Leaner protein, but the refined bun and any fries drag it down.",tweaks:"Half the bun or lettuce-wrap; side salad instead of fries; no soda."}
    ],
    avoid:["Loaded nachos","Crispy fried chicken basket","Milkshakes & soda","BBQ glazed ribs"],
    heads_up:["The Spinach & Feta Wrap is cooked spinach — skip it or sub the greens.","No decaf listed — ask for decaf, or go with water / unsweetened iced tea.","Shrimp Scampi is shrimp-heavy — fine if you ask for it lighter on shrimp."],
    note:"This is an independent menu, so grades are directional (estimated from the descriptions). The biggest win is skipping the sugary drink — bigger than any food choice here."
  });
}
</script>
</body>
</html>
